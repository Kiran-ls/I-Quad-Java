spring.application.name=ProductCatalogApp

#MySQL DB setup
spring.datasource.url=jdbc:mysql://localhost:3306/product_catalogApp_db
spring.datasource.username=root
spring.datasource.password=

#Hibernate setup
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

#session
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

#SMTP mail setup
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email_id
spring.mail.password=your_password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#OAuth setup
spring.security.oauth2.client.registration.google.client-id=your_id
spring.security.oauth2.client.registration.google.client-secret=your_secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google



